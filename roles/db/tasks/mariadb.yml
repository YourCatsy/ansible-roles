---
- name: Install MariaDB server
  ansible.builtin.apt:
    name:
      - mariadb-server
      - python3-pymysql
    update_cache: yes

- name: Start MariaDB service
  ansible.builtin.service:
    name: mysql
    state: started
    enabled: yes

- name: Ensure root authentication uses mysql_native_password
  ansible.builtin.command: >
    sudo mysql -e "ALTER USER 'root'@'localhost' IDENTIFIED WITH 'mysql_native_password' BY '{{ root_pass }}'; FLUSH PRIVILEGES;"
  register: auth_update
  ignore_errors: yes

- name: Debug root authentication update
  ansible.builtin.debug:
    msg: "Root authentication update output: {{ auth_update.stdout }}"

- name: Set root password
  ansible.builtin.mysql_user:
    name: root
    password: "{{ root_pass }}"
    host: localhost
    state: present
  ignore_errors: yes

- name: Create database
  ansible.builtin.mysql_db:
    name: "{{ db_name }}"
    state: present

- name: Create application user
  ansible.builtin.mysql_user:
    name: "{{ db_user }}"
    password: "{{ db_pass }}"
    priv: "{{ db_name }}.*:ALL"
    host: localhost
    state: present

- name: Debug MariaDB user list
  ansible.builtin.command: "sudo mysql -s -e \"SELECT User, Host FROM mysql.user;\""
  register: mariadb_users
  ignore_errors: yes

- name: Show MariaDB users
  ansible.builtin.debug:
    msg: "{{ mariadb_users.stdout_lines }}"
